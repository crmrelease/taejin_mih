<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>⚽ 좋아하는 축구선수</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    :root {
      --green-50:  #f0fdf4;
      --green-100: #dcfce7;
      --green-200: #bbf7d0;
      --green-500: #22c55e;
      --green-600: #16a34a;
      --green-700: #15803d;
      --green-800: #166534;
      --ink:       #1f2937;
      --muted:     #6b7280;
      --line:      #e5e7eb;
      --bg:        #f6fbf7;
      --card:      #ffffff;
      --shadow:    0 1px 2px rgba(20, 83, 45, 0.04), 0 4px 12px rgba(20, 83, 45, 0.06);
      --shadow-lg: 0 4px 8px rgba(20, 83, 45, 0.05), 0 12px 24px rgba(20, 83, 45, 0.08);
      --radius:    12px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 50% -200px, var(--green-100), transparent 60%),
        var(--bg);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 600px;
      margin: 0 auto;
      padding: 48px 20px 96px;
    }

    header.hero {
      text-align: center;
      margin-bottom: 32px;
    }

    header.hero h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
      color: var(--green-800);
    }

    header.hero p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--green-100);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .card + .card { margin-top: 20px; }

    .field { display: block; margin-bottom: 14px; }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--green-800);
      margin-bottom: 6px;
    }

    .field input[type="text"] {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      font: inherit;
      font-size: 15px;
      color: var(--ink);
      background: #fff;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    .field input[type="text"]::placeholder { color: #9ca3af; }

    .field input[type="text"]:focus {
      border-color: var(--green-600);
      box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.12);
    }

    /* 사진 첨부 영역 */
    .photo-field {
      display: flex;
      gap: 14px;
      align-items: stretch;
    }

    .photo-slot {
      width: 108px;
      height: 108px;
      flex-shrink: 0;
      position: relative;
      background: var(--green-50);
      border: 1.5px dashed var(--green-200);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }

    .photo-slot.has-image {
      border-style: solid;
      border-color: var(--green-200);
      background: #fff;
    }

    .photo-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-slot .placeholder {
      text-align: center;
      color: var(--green-700);
      font-size: 12px;
      line-height: 1.4;
      pointer-events: none;
      padding: 4px;
    }

    .photo-slot .placeholder .icon {
      font-size: 26px;
      display: block;
      margin-bottom: 2px;
    }

    .photo-actions {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: center;
    }

    .photo-actions .label-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--green-800);
    }

    .photo-actions .photo-meta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
      min-height: 1.4em;
    }

    .photo-btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button.ghost {
      appearance: none;
      cursor: pointer;
      background: #fff;
      color: var(--green-800);
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      height: 34px;
      padding: 0 12px;
      border: 1.5px solid var(--green-200);
      border-radius: 8px;
      transition: background 0.15s, border-color 0.15s;
    }

    button.ghost:hover { background: var(--green-50); border-color: var(--green-500); }
    button.ghost.danger { color: #b91c1c; border-color: #fecaca; }
    button.ghost.danger:hover { background: #fef2f2; border-color: #fca5a5; }

    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .form-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    .hint {
      flex: 1;
      font-size: 13px;
      color: var(--muted);
    }

    .hint.error { color: #dc2626; font-weight: 500; }

    button.submit {
      appearance: none;
      border: 0;
      cursor: pointer;
      background: var(--green-700);
      color: #fff;
      font: inherit;
      font-weight: 700;
      font-size: 15px;
      height: 46px;
      padding: 0 22px;
      border-radius: 10px;
      transition: background 0.15s, transform 0.05s;
      box-shadow: 0 1px 0 rgba(0,0,0,0.04);
    }

    button.submit:hover { background: var(--green-800); }
    button.submit:active { transform: translateY(1px); }
    button.submit:disabled { background: #9ca3af; cursor: not-allowed; }

    .list-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .list-head h2 {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      color: var(--green-800);
    }

    .count { font-size: 13px; color: var(--muted); }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #fff;
      border: 1px solid var(--green-100);
      border-radius: 10px;
      transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
    }

    .item:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-lg);
      border-color: var(--green-200);
    }

    .item .thumb {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      border-radius: 50%;
      overflow: hidden;
      background: var(--green-50);
      border: 1.5px solid var(--green-100);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--green-700);
    }

    .item .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .item .body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .item .who {
      font-weight: 700;
      color: var(--ink);
      font-size: 15px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item .player {
      color: var(--green-800);
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item .when {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      align-self: flex-start;
      padding-top: 4px;
    }

    .empty {
      text-align: center;
      padding: 28px 16px;
      color: var(--muted);
      font-size: 14px;
      background: var(--green-50);
      border: 1px dashed var(--green-200);
      border-radius: 10px;
    }

    .loading {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 14px;
    }

    .config-warning {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fde68a;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13.5px;
      line-height: 1.55;
    }

    /* 디버그 카드 — 모니터링 테스트용 */
    .debug-card {
      background: #fffbeb;
      border: 1px dashed #facc15;
      border-radius: 12px;
      padding: 16px 18px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .debug-card .text {
      flex: 1;
      font-size: 12.5px;
      color: #854d0e;
      line-height: 1.5;
    }
    .debug-card .text strong { color: #713f12; }
    button.debug-btn {
      appearance: none;
      cursor: pointer;
      background: #fde047;
      color: #713f12;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      height: 38px;
      padding: 0 14px;
      border: 1.5px solid #facc15;
      border-radius: 8px;
      white-space: nowrap;
      transition: background 0.15s;
    }
    button.debug-btn:hover { background: #facc15; }
    button.debug-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .debug-card .feedback {
      font-size: 12px;
      color: #713f12;
      min-height: 1.4em;
      margin-top: 4px;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      header.hero h1 { font-size: 26px; }
      .card { padding: 20px; }
      .photo-field { flex-direction: column; }
      .photo-slot { width: 100%; height: 160px; }
      .form-row { flex-direction: column; align-items: stretch; }
      .hint { order: 2; text-align: center; }
      button.submit { width: 100%; }
      .item .thumb { width: 56px; height: 56px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <h1>⚽ 좋아하는 축구선수</h1>
      <p>당신이 좋아하는 선수를 알려주세요</p>
    </header>

    <section class="card" aria-labelledby="form-title">
      <h2 id="form-title" style="margin:0 0 14px;font-size:16px;color:var(--green-800);">새로 등록하기</h2>
      <form id="player-form" autocomplete="off" novalidate>
        <div class="field">
          <label for="name">이름</label>
          <input id="name" name="name" type="text" maxlength="30" placeholder="당신의 이름" required />
        </div>
        <div class="field">
          <label for="player">좋아하는 축구선수</label>
          <input id="player" name="player" type="text" maxlength="30" placeholder="예: 손흥민" required />
        </div>

        <div class="field">
          <label>선수 사진 <span style="color:var(--muted);font-weight:500;">(선택)</span></label>
          <div class="photo-field">
            <label class="photo-slot" id="photo-slot" for="photo-input" title="사진 선택">
              <input id="photo-input" class="file-input" type="file" accept="image/jpeg,image/png,image/webp" />
              <span class="placeholder" id="photo-placeholder">
                <span class="icon">⚽</span>
                사진 첨부<br />
                <span style="color:var(--muted);">탭해서 선택</span>
              </span>
              <img id="photo-preview" alt="" style="display:none;" />
            </label>
            <div class="photo-actions">
              <span class="label-text">jpg / png / webp · 5MB 이하</span>
              <span class="photo-meta" id="photo-meta">사진 없이도 등록할 수 있어요.</span>
              <div class="photo-btn-row">
                <button type="button" class="ghost" id="photo-pick-btn">사진 선택</button>
                <button type="button" class="ghost danger" id="photo-clear-btn" style="display:none;">제거</button>
              </div>
            </div>
          </div>
        </div>

        <div class="form-row">
          <span id="hint" class="hint">이름과 선수 모두 30자 이내로 적어주세요</span>
          <button id="submit-btn" class="submit" type="submit">등록하기</button>
        </div>
      </form>
    </section>

    <section class="card" aria-labelledby="list-title">
      <div class="list-head">
        <h2 id="list-title">📋 지금까지 등록된 친구들</h2>
        <span id="count" class="count">불러오는 중…</span>
      </div>
      <div id="list-area">
        <div class="loading">목록을 불러오는 중이에요…</div>
      </div>
    </section>

    <section class="debug-card" aria-label="디버그 도구">
      <div style="flex:1;">
        <div class="text">
          <strong>🧨 모니터링 테스트</strong> — 일부러 화면 에러를 발생시켜요.<br />
          누르면 mo-bot이 5분 안에 <code>#error</code> 채널로 알림을 보냅니다.
        </div>
        <div class="feedback" id="debug-feedback"></div>
      </div>
      <button type="button" id="trigger-error-btn" class="debug-btn">테스트 에러 발생</button>
    </section>

    <p class="footer">made by 랑 · agent_rang</p>
  </main>

  <script>
    // ---- 설정 (사용자가 채워넣을 영역) ------------------------------
    // JSONBin.io
    const JSONBIN_BIN_ID = "69ff0dbf250b1311c3260b83";
    const JSONBIN_MASTER_KEY = "$2a$10$Zms1Zv3vSzrf1bn80EkVF.L5Fe5leRS6QB/rg.6R7j3qdEkdAj8cG";

    // imgbb (선수 사진 호스팅) — https://api.imgbb.com 에서 발급
    // 키 미설정 시 사진 첨부는 자동 비활성화되고, 텍스트만 등록 가능
    const IMGBB_API_KEY = "2a0c8e979640ebf1a9af8844694d892a";
    // ---------------------------------------------------------------

    const API_BASE = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
    const MAX_PHOTO_BYTES = 5 * 1024 * 1024;
    const RESIZE_MAX = 800;
    const RESIZE_QUALITY = 0.82;
    const ALLOWED_TYPES = new Set(["image/jpeg", "image/png", "image/webp"]);

    const $ = (sel) => document.querySelector(sel);
    const listArea = $("#list-area");
    const countEl = $("#count");
    const hintEl = $("#hint");
    const form = $("#player-form");
    const nameInput = $("#name");
    const playerInput = $("#player");
    const submitBtn = $("#submit-btn");
    const photoInput = $("#photo-input");
    const photoSlot = $("#photo-slot");
    const photoPlaceholder = $("#photo-placeholder");
    const photoPreview = $("#photo-preview");
    const photoMeta = $("#photo-meta");
    const photoPickBtn = $("#photo-pick-btn");
    const photoClearBtn = $("#photo-clear-btn");

    let pendingPhotoBlob = null;

    function isJsonbinConfigured() {
      return JSONBIN_BIN_ID && !JSONBIN_BIN_ID.startsWith("__")
        && JSONBIN_MASTER_KEY && !JSONBIN_MASTER_KEY.startsWith("__");
    }
    function isImgbbConfigured() {
      return IMGBB_API_KEY && !IMGBB_API_KEY.startsWith("__");
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatRelative(ts) {
      const diff = Date.now() - ts;
      if (diff < 0 || diff < 60_000) return "방금 전";
      const min = Math.floor(diff / 60_000);
      if (min < 60) return `${min}분 전`;
      const hr = Math.floor(min / 60);
      if (hr < 24) return `${hr}시간 전`;
      const day = Math.floor(hr / 24);
      if (day < 30) return `${day}일 전`;
      return new Date(ts).toLocaleDateString("ko-KR");
    }

    function initialOf(name) {
      const t = (name || "").trim();
      if (!t) return "⚽";
      // 한글/이모지/영문 모두 첫 글자 1개 (서로게이트 페어 안전)
      return Array.from(t)[0];
    }

    // ---------------- 사진 처리 ----------------

    function setPhotoMeta(text, isError) {
      photoMeta.textContent = text;
      photoMeta.style.color = isError ? "#b91c1c" : "";
    }

    function clearPhoto() {
      pendingPhotoBlob = null;
      photoInput.value = "";
      photoPreview.removeAttribute("src");
      photoPreview.style.display = "none";
      photoPlaceholder.style.display = "";
      photoSlot.classList.remove("has-image");
      photoClearBtn.style.display = "none";
      setPhotoMeta("사진 없이도 등록할 수 있어요.", false);
    }

    async function resizeImage(file) {
      const url = URL.createObjectURL(file);
      try {
        const img = await new Promise((resolve, reject) => {
          const im = new Image();
          im.onload = () => resolve(im);
          im.onerror = () => reject(new Error("이미지를 읽지 못했어요."));
          im.src = url;
        });
        let { naturalWidth: w, naturalHeight: h } = img;
        if (!w || !h) throw new Error("이미지 크기를 알 수 없어요.");
        if (w > RESIZE_MAX || h > RESIZE_MAX) {
          const ratio = Math.min(RESIZE_MAX / w, RESIZE_MAX / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);
        const blob = await new Promise((resolve, reject) => {
          canvas.toBlob(
            (b) => (b ? resolve(b) : reject(new Error("리사이징 실패"))),
            "image/jpeg",
            RESIZE_QUALITY
          );
        });
        return { blob, width: w, height: h };
      } finally {
        URL.revokeObjectURL(url);
      }
    }

    async function handlePhotoSelected(file) {
      if (!file) return;
      if (!ALLOWED_TYPES.has(file.type)) {
        clearPhoto();
        setPhotoMeta("jpg / png / webp 형식만 가능해요.", true);
        return;
      }
      if (file.size > MAX_PHOTO_BYTES) {
        clearPhoto();
        setPhotoMeta(`5MB 이하만 가능해요. (선택한 파일: ${(file.size / 1024 / 1024).toFixed(1)}MB)`, true);
        return;
      }

      setPhotoMeta("미리보기 만드는 중…", false);
      try {
        const { blob, width, height } = await resizeImage(file);
        pendingPhotoBlob = blob;
        const dataUrl = URL.createObjectURL(blob);
        photoPreview.src = dataUrl;
        photoPreview.style.display = "";
        photoPlaceholder.style.display = "none";
        photoSlot.classList.add("has-image");
        photoClearBtn.style.display = "";
        const kb = (blob.size / 1024).toFixed(0);
        setPhotoMeta(`준비됨 · ${width}×${height} · 약 ${kb}KB`, false);
      } catch (e) {
        clearPhoto();
        setPhotoMeta(`사진을 처리하지 못했어요. (${e.message})`, true);
      }
    }

    async function uploadToImgbb(blob) {
      if (!isImgbbConfigured()) {
        throw new Error("imgbb API key가 설정되지 않았어요.");
      }
      const fd = new FormData();
      fd.append("image", blob, "player.jpg");
      const res = await fetch(`https://api.imgbb.com/1/upload?key=${encodeURIComponent(IMGBB_API_KEY)}`, {
        method: "POST",
        body: fd,
      });
      if (!res.ok) throw new Error(`imgbb 업로드 실패 (HTTP ${res.status})`);
      const data = await res.json();
      if (!data || !data.success || !data.data || !data.data.url) {
        const msg = data && data.error && data.error.message ? data.error.message : "응답 형식 오류";
        throw new Error(`imgbb 업로드 실패: ${msg}`);
      }
      return data.data.url;
    }

    // ---------------- JSONBin ----------------

    async function fetchBin() {
      const res = await fetch(`${API_BASE}/latest`, {
        method: "GET",
        headers: {
          "X-Master-Key": JSONBIN_MASTER_KEY,
          "X-Bin-Meta": "false",
        },
        cache: "no-store",
      });
      if (!res.ok) throw new Error(`GET 실패: ${res.status}`);
      const data = await res.json();
      // 두 가지 옛 형태 호환: 순수 배열 vs { players: [...] }
      if (Array.isArray(data)) return { players: data, errors: [] };
      return {
        players: Array.isArray(data && data.players) ? data.players : [],
        errors: Array.isArray(data && data.errors) ? data.errors : [],
      };
    }

    async function saveBin(payload) {
      const res = await fetch(API_BASE, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": JSONBIN_MASTER_KEY,
        },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(`PUT 실패: ${res.status}`);
      return res.json();
    }

    async function fetchPlayers() {
      return (await fetchBin()).players;
    }

    async function savePlayers(arr) {
      // errors 필드는 그대로 보존하면서 players 만 교체
      const current = await fetchBin();
      return saveBin({ players: arr, errors: current.errors });
    }

    // ---------------- 전역 에러 캡처 (mo-bot 알림용) ----------------

    const recentErrorKeys = new Set();
    const ERROR_DEDUP_WINDOW_MS = 30_000;
    const MAX_ERRORS_KEPT = 50;

    function setDebugFeedback(text, isError) {
      const el = document.getElementById("debug-feedback");
      if (!el) return;
      el.textContent = text;
      el.style.color = isError ? "#b91c1c" : "";
    }

    async function reportError(err, context) {
      try {
        const message = String((err && err.message) || err || "알 수 없는 에러").slice(0, 500);
        const dedupKey = (context || "") + "|" + message.slice(0, 200);
        if (recentErrorKeys.has(dedupKey)) return;  // 같은 에러 30초 내 중복 방지
        recentErrorKeys.add(dedupKey);
        setTimeout(() => recentErrorKeys.delete(dedupKey), ERROR_DEDUP_WINDOW_MS);

        if (!isJsonbinConfigured()) return;

        const payload = await fetchBin();
        const entry = {
          id: (crypto.randomUUID && crypto.randomUUID()) || String(Date.now()),
          message,
          stack: ((err && err.stack) || "").slice(0, 1500),
          context: context || "",
          url: location.href,
          ua: (navigator.userAgent || "").slice(0, 300),
          ts: Date.now(),
        };
        const nextErrors = [...payload.errors, entry];
        // 100KB bin 한도 보호: 50건 넘으면 가장 오래된 것부터 자름
        while (nextErrors.length > MAX_ERRORS_KEPT) nextErrors.shift();
        await saveBin({ players: payload.players, errors: nextErrors });
        return entry;
      } catch (innerErr) {
        // 에러 보고 자체가 또 실패하면 — 무한루프 방지로 콘솔에만 남기고 조용히 끝
        console.error("error report failed", innerErr);
      }
    }

    window.addEventListener("error", (event) => {
      const err = event.error || new Error(event.message || "window error");
      reportError(err, "window.error");
    });

    window.addEventListener("unhandledrejection", (event) => {
      const reason = event.reason;
      const err = reason instanceof Error ? reason : new Error(String(reason || "unhandled rejection"));
      reportError(err, "unhandledrejection");
    });

    // ---------------- 렌더 ----------------

    function thumbHtml(it) {
      if (it.photoUrl) {
        return `<div class="thumb"><img src="${escapeHtml(it.photoUrl)}" alt="${escapeHtml(it.player)}" loading="lazy" referrerpolicy="no-referrer" /></div>`;
      }
      return `<div class="thumb" aria-hidden="true">${escapeHtml(initialOf(it.player))}</div>`;
    }

    function renderList(items) {
      countEl.textContent = `${items.length}명 등록`;

      if (items.length === 0) {
        listArea.innerHTML = `<div class="empty">아직 아무도 등록 안 했어요. 가장 먼저 적어볼까요?</div>`;
        return;
      }

      const sorted = [...items].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      listArea.innerHTML = `<div class="list">${sorted.map((it) => `
        <div class="item">
          ${thumbHtml(it)}
          <div class="body">
            <span class="who">${escapeHtml(it.name)}</span>
            <span class="player">${escapeHtml(it.player)}</span>
          </div>
          <span class="when" title="${new Date(it.createdAt || 0).toLocaleString("ko-KR")}">${formatRelative(it.createdAt || 0)}</span>
        </div>
      `).join("")}</div>`;
    }

    function showError(msg) {
      listArea.innerHTML = `<div class="config-warning">${escapeHtml(msg)}</div>`;
      countEl.textContent = "";
    }

    function showConfigWarning() {
      listArea.innerHTML = `<div class="config-warning">
        ⚠️ JSONBin.io 키가 아직 설정되지 않았어요.<br />
        코드 상단의 <code>JSONBIN_BIN_ID</code>와 <code>JSONBIN_MASTER_KEY</code>를 채워주세요.
      </div>`;
      countEl.textContent = "";
      submitBtn.disabled = true;
    }

    async function refresh() {
      try {
        const { players } = await fetchBin();
        renderList(players);
      } catch (e) {
        console.error(e);
        showError(`목록을 불러오지 못했어요. (${e.message})`);
      }
    }

    // ---------------- 이벤트 ----------------

    photoInput.addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (file) handlePhotoSelected(file);
    });

    photoPickBtn.addEventListener("click", () => photoInput.click());
    photoClearBtn.addEventListener("click", clearPhoto);

    // 디버그 — "테스트 에러 발생" 버튼
    const triggerErrorBtn = document.getElementById("trigger-error-btn");
    if (triggerErrorBtn) {
      triggerErrorBtn.addEventListener("click", async () => {
        triggerErrorBtn.disabled = true;
        setDebugFeedback("에러 만드는 중…", false);
        const ts = new Date().toLocaleString("ko-KR");
        // 비동기 throw → window 'error' 이벤트가 잡아서 reportError가 자동 발사
        // 동시에 명시적으로도 reportError 호출해서 즉시 기록 (둘 중 어느 쪽이라도 잡히게)
        try {
          await reportError(
            new Error(`테스트 에러 (디버그 버튼) — ${ts}`),
            "debug-button"
          );
          setDebugFeedback("✅ JSONBin에 기록 완료. 5분 안에 #error 채널에 알림이 도착해요.", false);
        } catch (e) {
          setDebugFeedback(`기록 실패: ${e.message}`, true);
        } finally {
          // 비동기 throw도 한 번 — window 'error' 핸들러 검증용
          setTimeout(() => {
            throw new Error(`테스트 에러 (window.error 경로) — ${ts}`);
          }, 0);
          setTimeout(() => { triggerErrorBtn.disabled = false; }, 1500);
        }
      });
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = nameInput.value.trim();
      const player = playerInput.value.trim();

      if (!name || !player) {
        hintEl.textContent = "이름과 좋아하는 선수를 모두 적어주세요.";
        hintEl.classList.add("error");
        return;
      }
      if (name.length > 30 || player.length > 30) {
        hintEl.textContent = "각 항목은 30자 이내로 적어주세요.";
        hintEl.classList.add("error");
        return;
      }

      hintEl.classList.remove("error");
      submitBtn.disabled = true;

      let photoUrl = null;
      try {
        if (pendingPhotoBlob) {
          if (!isImgbbConfigured()) {
            throw new Error("사진 호스팅 키가 설정되지 않았어요. 사진을 빼고 등록해주세요.");
          }
          hintEl.textContent = "사진 업로드 중…";
          photoUrl = await uploadToImgbb(pendingPhotoBlob);
        }

        hintEl.textContent = "등록 중…";
        const current = await fetchBin();
        const entry = {
          id: (crypto.randomUUID && crypto.randomUUID()) || String(Date.now()),
          name,
          player,
          createdAt: Date.now(),
        };
        if (photoUrl) entry.photoUrl = photoUrl;

        const nextPlayers = [...current.players, entry];
        await saveBin({ players: nextPlayers, errors: current.errors });

        nameInput.value = "";
        playerInput.value = "";
        clearPhoto();
        nameInput.focus();
        hintEl.textContent = "등록 완료! 다른 친구도 적어볼까요?";
        renderList(nextPlayers);
      } catch (err) {
        console.error(err);
        hintEl.textContent = `등록 실패: ${err.message}`;
        hintEl.classList.add("error");
      } finally {
        submitBtn.disabled = false;
      }
    });

    // ---------------- 부팅 ----------------

    if (!isJsonbinConfigured()) {
      showConfigWarning();
    } else {
      refresh();
    }

    if (!isImgbbConfigured()) {
      // 사진 영역만 비활성화, 텍스트 등록은 그대로 가능
      photoPickBtn.disabled = true;
      photoSlot.style.pointerEvents = "none";
      photoSlot.style.opacity = "0.6";
      setPhotoMeta("사진 호스팅 키 미설정 — 텍스트만 등록 가능합니다.", false);
    }
  </script>
</body>
</html>
